<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blossom</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Pacifico&display=swap"
        rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #F6E5E7;
            background-image: radial-gradient(#e8f5e9 1px, transparent 1px),
                radial-gradient(#fce4ec 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            display: flex;
        }

        /* SIDEBAR FILTER */
        .sidebar {
            width: 220px;
            background: #A0AB89;
            border-right: 2px solid #f3d1dc;
            padding: 20px;
            height: 100vh;
            position: sticky;
            color: #fff;
            top: 0;
        }

        .sidebar h3 {
            margin-bottom: 15px;
            color: #FFF;
        }

        .filter-group {
            margin-bottom: 20px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            cursor: pointer;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            padding: 20px;
        }

        /* HEADER */
        .header {
            background: #e69b97;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo {
            font-family: 'Pacifico', cursive;
            font-size: 24px;
            color: #fff;
        }

        .tabs button {
            border: none;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 14px;
            border-radius: 20px;
            margin-left: 10px;
            cursor: pointer;
        }

        .tabs button.active {
            background: white;
            font-weight: 600;
        }

        .search {
            width: 100%;
            padding: 12px 18px;
            border-radius: 30px;
            border: none;
            outline: none;
        }

        /* GRID */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .card {
            background: #fff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-6px);
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin-bottom: 5px;
        }

        .card small {
            color: #777;
            display: block;
            margin-bottom: 10px;
        }

        .tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #fce4ec;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .info {
            font-size: 13px;
            margin-bottom: 5px;
        }

        /* color palette: 
    - #F6E5E7 (off-white)
    - #828C6A (green)
    - #A0AB89 (light green)
    - #EFC0BC (light pink)
    - #E69B97 (pink) */
    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>🌿 Filters</h3>

        <div class="filter-group">
            <strong>Light</strong>
            <label><input type="checkbox"> Full Sun</label>
            <label><input type="checkbox"> Partial Sun</label>
            <label><input type="checkbox"> Shade</label>
        </div>

        <div class="filter-group">
            <strong>Pest</strong>
            <label><input type="checkbox"> ladybugs</label>
            <label><input type="checkbox"> beetles</label>
        </div>

        <div class="filter-group">
            <strong>Difficulty</strong>
            <label><input type="checkbox"> Easy</label>
            <label><input type="checkbox"> Medium</label>
            <label><input type="checkbox"> Hard</label>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">
            <div class="header-top">
                <div class="logo">🌸 blossom</div>
                <div class="tabs">
                    <button class="active">Plants</button>
                    <button>Community</button>
                </div>
            </div>

            <input class="search" placeholder="search your plant friend...">
        </div>

        <!-- GRID -->
        <div class="grid">

            <div class="card">
                <div class="tag">easy</div>
                <img
                    src="https://www.southernliving.com/thmb/0pEtYYeGqHPPBZrJ6B1fpMfJVqk=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/GettyImages-2206518010-92cc04ca76db470d87e6f1f3635519eb.jpg">
                <div class="card-content">
                    <h3>Mint</h3>
                    <small>Perennial</small>
                    <div class="info">☀️ Partial sun</div>
                    <div class="info">💧 2-3 times weekly</div>
                </div>
            </div>

            <div class="card">
                <div class="tag">medium</div>
                <img
                    src="https://npr.brightspotcdn.com/dims4/default/bdec9eb/2147483647/strip/true/crop/1366x768+0+0/resize/880x495!/quality/90/?url=http%3A%2F%2Fnpr-brightspot.s3.amazonaws.com%2F29%2F78%2F49bf64b04749acb2541763edb03e%2Fhydrangea-dan-tuohy-photo-08192024.jpg">
                <div class="card-content">
                    <h3>Hydrangea</h3>
                    <small>Perennial</small>
                    <div class="info">☀️ Partial sun</div>
                    <div class="info">💧 Once weekly</div>
                </div>
            </div>

            <div class="card">
                <div class="tag">easy</div>
                <img src="https://images.unsplash.com/photo-1468327768560-75b778cbb551">
                <div class="card-content">
                    <h3>Tulip</h3>
                    <small>annual</small>
                    <div class="info">☀️ Full sun</div>
                    <div class="info">💧 Once weekly</div>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
